name: Deploy frontend to GitHub Pages

# build & deploy อัตโนมัติเมื่อ push ไฟล์ใน frontend/ ขึ้น branch หลัก
on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# ให้ deploy ทีละครั้ง (ยกเลิกคิวเก่าถ้ามีใหม่)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build
        env:
          # URL ของ Apps Script Web App — ตั้งใน repo Settings > Secrets and variables > Actions
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          # project page อยู่ที่ /<repo>/ ; ถ้าใช้ custom domain หรือ user/org page ให้เปลี่ยนเป็น "/"
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
